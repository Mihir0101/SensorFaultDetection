<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; background-color: #f4f7f6; }
        .result-box { display: inline-block; padding: 40px; border-radius: 10px; background: white; box-shadow: 0px 0px 15px rgba(0,0,0,0.2); }
        .status { font-size: 24px; font-weight: bold; margin: 20px; }
        .fault { color: #d9534f; }
        .safe { color: #5cb85c; }
        a { text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="result-box">
        <h2>Analysis Result</h2>
        <div class="status {{ 'fault' if 'Fault' in final_result else 'safe' }}">
            {{ final_result }}
        </div>
        <br>
        <a href="/">← Analyze another file</a>
    </div>
</body>
</html>
