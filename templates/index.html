<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sensor Fault Detection</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; text-align: center; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); display: inline-block; }
        h2 { color: #333; }
        input[type="file"] { margin: 20px 0; border: 1px solid #ccc; padding: 10px; border-radius: 5px; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; font-size: 16px; }
        button:hover { background-color: #218838; }
        .note { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Industrial Sensor Fault Detection</h2>
        <p>Upload a CSV file containing the 460 sensor readings.</p>
        
        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept=".csv" required>
            <br>
            <button type="submit">Analyze Sensor Data</button>
        </form>

        <p class="note">Note: Ensure headers match the training schema.</p>
    </div>
</body>
</html>
